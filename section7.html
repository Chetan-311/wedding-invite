<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
        }

        .section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            position: relative;
        }

        .playfair {
            font-family: 'Playfair Display', serif;
        }

        .cormorant {
            font-family: 'Cormorant Garamond', serif;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #d4af37, #f4e4bc, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8960c);
            color: #0a0a0a;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.1em;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.1em;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .section-number {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            color: rgba(212, 175, 55, 0.5);
            text-transform: uppercase;
        }

        #closing {
            background: linear-gradient(to top, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
        }

        .nav-buttons {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- Navigation Buttons -->
    <div class="nav-buttons">
        <button class="btn-secondary" onclick="location.href='section7.html'">← Back</button>
        <button class="btn-primary" onclick="location.href='index.html'">🏠 Home</button>
    </div>

    <!-- Content -->
    <div class="content">
        <!-- Closing Section -->
        <section class="section" id="closing">
            <div class="section-number">Closing</div>
            <div class="text-center">
                <div class="text-6xl mb-4">🙏</div>
                <h2 class="text-5xl md:text-7xl playfair gold-gradient mb-6">Thank You</h2>
                <p class="text-2xl cormorant text-gray-300 mb-8">
                    Your presence will make our celebration complete
                </p>
                <p class="text-xl text-gray-400 mb-12">
                    With love and gratitude,<br>
                    <span class="gold-gradient playfair text-2xl">Aishwarya & Rohit</span>
                </p>
                <div class="text-6xl mb-8 animate-bounce">💍</div>
                <p class="text-gray-500 cormorant">May 1, 2026</p>
                <div class="mt-12 glass rounded-2xl p-6 inline-block border-2 border-amber-500/30">
                    <p class="text-gray-400 cormorant">We can't wait to see you there!</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Three.js Setup
        let scene, camera, renderer, particles;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const particleCount = 2000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 200;
                positions[i + 1] = (Math.random() - 0.5) * 200;
                positions[i + 2] = (Math.random() - 0.5) * 200;

                colors[i] = 0.83 + Math.random() * 0.1;
                colors[i + 1] = 0.69 + Math.random() * 0.1;
                colors[i + 2] = 0.22 + Math.random() * 0.1;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;

            particles.rotation.x += 0.0005;
            particles.rotation.y += 0.0005;

            particles.rotation.x += 0.05 * (targetY - particles.rotation.x);
            particles.rotation.y += 0.05 * (targetX - particles.rotation.y);

            renderer.render(scene, camera);
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX - window.innerWidth / 2;
            mouseY = e.clientY - window.innerHeight / 2;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('load', () => {
            initThree();
            
            // Fireworks effect
            setTimeout(() => {
                const interval = setInterval(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight * 0.5;
                    createFirework(x, y);
                }, 500);
                
                setTimeout(() => clearInterval(interval), 5000);
            }, 1000);
        });

        function createFirework(x, y) {
            const colors = ['#d4af37', '#f4e4bc', '#fff', '#ff6b6b', '#4ecdc4'];
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.style.left = x + 'px';
                firework.style.top = y + 'px';
                firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(firework);
                
                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 2 + Math.random() * 3;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                let posX = x;
                let posY = y;
                let opacity = 1;
                
                function animateFirework() {
                    posX += vx;
                    posY += vy;
                    opacity -= 0.02;
                    
                    firework.style.left = posX + 'px';
                    firework.style.top = posY + 'px';
                    firework.style.opacity = opacity;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animateFirework);
                    } else {
                        firework.remove();
                    }
                }
                
                animateFirework();
            }
        }
    </script>
</body>
</html>
